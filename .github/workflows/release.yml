name: Release

# Build the extension and attach a ready-to-install dist.zip to a GitHub
# Release whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package dist as zip
        run: |
          cd dist
          zip -r ../browser-memory-os.zip .
          cd ..

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: browser-memory-os.zip
          generate_release_notes: true
